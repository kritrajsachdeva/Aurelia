<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — AURELIA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    .auth-shell { min-height: 85vh; display: flex; align-items: center; justify-content: center; background: var(--bg-alt); padding: 3rem 1.5rem; }
    .auth-card { background: var(--bg); border: 1px solid var(--border); padding: 2.5rem; width: 100%; max-width: 440px; }
    .auth-logo-link { display: block; font-size: 1.5rem; font-weight: 300; letter-spacing: 0.2em; text-transform: uppercase; text-align: center; margin-bottom: 1.75rem; color: var(--text); text-decoration: none; }
    .auth-tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 2rem; gap: 0; }
    .auth-tab { flex: 1; background: transparent; border: 1px solid var(--border); padding: 0.75rem; font-size: 0.85rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; color: var(--text-muted) !important; border-bottom: none; transition: all 0.2s; font-family: inherit; }
    .auth-tab.active { color: var(--text) !important; background: var(--text) !important; border-color: var(--text) !important; color: #fff !important; }
    .auth-tab:not(.active) { color: #71717A !important; background: #fff !important; }
    .auth-form { display: flex; flex-direction: column; gap: 1rem; }
    .auth-form label { font-size: 0.8rem; font-weight: 500; letter-spacing: 0.05em; color: var(--text-muted); display: block; margin-bottom: 0.3rem; }
    .auth-form .btn { margin-top: 0.5rem; width: 100%; justify-content: center; }
    .auth-status { font-size: 0.82rem; padding: 0.65rem 0.9rem; margin-bottom: 1rem; border-radius: 2px; }
    .auth-status:empty { display: none; }
    .auth-status.is-error { background: #fef2f2; color: #c0392b; border: 1px solid #fecaca; }
    .auth-status.is-success { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
    .auth-user-state { text-align: center; font-size: 0.85rem; color: var(--text-muted); margin-top: 1.5rem; line-height: 1.8; }
    [data-auth-panel][hidden] { display: none; }
    .auth-hint { font-size: 0.78rem; color: var(--text-muted); text-align: center; margin-top: 1.25rem; }
    .auth-hint a { color: var(--text); text-decoration: underline; }
  </style>
</head>
<body>
  <header class="navbar">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">Aurelia</a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="women.html">Women</a></li>
        <li><a href="men.html">Men</a></li>
        <li><a href="product.html">New Arrivals</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
      <div class="nav-actions">
        <a href="cart.html" class="nav-action-btn">
          <span class="cart-icon-wrap">
            <i class="fas fa-shopping-bag"></i>
            <span class="cart-count-badge">0</span>
          </span>
          <span class="hide-mobile">Cart</span>
        </a>
      </div>
    </div>
  </header>

  <section class="auth-shell">
    <div class="auth-card">
      <a href="index.html" class="auth-logo-link">Aurelia</a>

      <div class="auth-tabs">
        <button class="auth-tab active" data-auth-tab="signin" type="button">Sign In</button>
        <button class="auth-tab" data-auth-tab="signup" type="button">Sign Up</button>
      </div>

      <div data-auth-status class="auth-status" role="alert"></div>

      <!-- SIGN IN PANEL -->
      <div data-auth-panel="signin">
        <form data-signin-form class="auth-form" novalidate>
          <div>
            <label for="signin-email">Email Address</label>
            <input class="form-control" id="signin-email" name="email" type="email" required placeholder="you@example.com">
          </div>
          <div>
            <label for="signin-password">Password</label>
            <input class="form-control" id="signin-password" name="password" type="password" required placeholder="Your password">
          </div>
          <button class="btn btn-dark" type="submit">Sign In</button>
        </form>
        <p class="auth-hint">Don't have an account? <a href="#" onclick="document.querySelector('[data-auth-tab=signup]').click();return false;">Sign Up</a></p>
      </div>

      <!-- SIGN UP PANEL -->
      <div data-auth-panel="signup" hidden>
        <form data-signup-form class="auth-form" novalidate>
          <div>
            <label for="signup-name">Full Name</label>
            <input class="form-control" id="signup-name" name="name" type="text" required placeholder="Your full name">
          </div>
          <div>
            <label for="signup-email">Email Address</label>
            <input class="form-control" id="signup-email" name="email" type="email" required placeholder="you@example.com">
          </div>
          <div>
            <label for="signup-password">Password</label>
            <input class="form-control" id="signup-password" name="password" type="password" minlength="6" required placeholder="At least 6 characters">
          </div>
          <div>
            <label for="signup-confirm">Confirm Password</label>
            <input class="form-control" id="signup-confirm" name="confirmPassword" type="password" required placeholder="Re-enter password">
          </div>
          <button class="btn btn-dark" type="submit">Create Account</button>
        </form>
        <p class="auth-hint">Already have an account? <a href="#" onclick="document.querySelector('[data-auth-tab=signin]').click();return false;">Sign in</a></p>
      </div>

      <!-- SIGNED IN STATE -->
      <div data-signed-in hidden class="auth-user-state">
        <p>Welcome back, <strong data-user-name></strong></p>
        <p style="font-size:0.8rem;margin-top:0.25rem"><span data-user-email></span></p>
        <button type="button" class="btn btn-outline" data-signout style="margin-top:0.75rem;width:100%;justify-content:center">Sign Out</button>
        <p style="margin-top:1rem"><a href="index.html" style="font-size:0.82rem;color:var(--text-muted)">← Back to store</a></p>
      </div>
    </div>
  </section>

  <script src="cart.js"></script>
  <script src="user.js"></script>
  <script src="auth.js"></script>
</body>
</html>
